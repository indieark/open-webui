        LOADER_JS = "(() => {\n\tconst BRAND_NAME = 'IndieArk Chat';\n\tconst OPEN_WEBUI = 'Open WebUI';\n\tlet isPatching = false;\n\tlet patchQueued = false;\n\n\tconst normalizeBrandText = (value) => {\n\t\tif (!value) {\n\t\t\treturn value;\n\t\t}\n\n\t\treturn value\n\t\t\t.replace(/IndieArk Chat\\s*\\(Open WebUI\\)/g, BRAND_NAME)\n\t\t\t.replace(/Open WebUI/g, BRAND_NAME);\n\t};\n\n\tconst setOrCreateMeta = (selector, attrs) => {\n\t\tlet element = document.head.querySelector(selector);\n\t\tif (!element) {\n\t\t\telement = document.createElement('meta');\n\t\t\tdocument.head.appendChild(element);\n\t\t}\n\n\t\tObject.entries(attrs).forEach(([key, value]) => {\n\t\t\telement.setAttribute(key, value);\n\t\t});\n\t};\n\n\tconst patchHead = () => {\n\t\tif (document.title) {\n\t\t\tconst nextTitle = normalizeBrandText(document.title);\n\t\t\tif (nextTitle !== document.title) {\n\t\t\t\tdocument.title = nextTitle;\n\t\t\t}\n\t\t}\n\n\t\tsetOrCreateMeta('meta[name=\"apple-mobile-web-app-title\"]', {\n\t\t\tname: 'apple-mobile-web-app-title',\n\t\t\tcontent: BRAND_NAME\n\t\t});\n\t\tsetOrCreateMeta('meta[name=\"application-name\"]', {\n\t\t\tname: 'application-name',\n\t\t\tcontent: BRAND_NAME\n\t\t});\n\t\tsetOrCreateMeta('meta[name=\"description\"]', {\n\t\t\tname: 'description',\n\t\t\tcontent: BRAND_NAME\n\t\t});\n\n\t\tconst metaThemeColor = document.head.querySelector('meta[name=\"theme-color\"]');\n\t\tif (metaThemeColor) {\n\t\t\tmetaThemeColor.setAttribute(\n\t\t\t\t'content',\n\t\t\t\tdocument.documentElement.classList.contains('light') ? '#f8f9fa' : '#0b0f19'\n\t\t\t);\n\t\t}\n\n\t\tdocument.head.querySelectorAll('[content], [title]').forEach((element) => {\n\t\t\t['content', 'title'].forEach((attr) => {\n\t\t\t\tconst value = element.getAttribute(attr);\n\t\t\t\tconst nextValue = normalizeBrandText(value);\n\t\t\t\tif (nextValue !== value) {\n\t\t\t\t\telement.setAttribute(attr, nextValue);\n\t\t\t\t}\n\t\t\t});\n\t\t});\n\t};\n\n\tconst patchThemeClass = () => {\n\t\tdocument.documentElement.classList.toggle(\n\t\t\t'indieark-oled-dark',\n\t\t\twindow.localStorage?.theme === 'oled-dark'\n\t\t);\n\t};\n\n\tconst patchTextNode = (node) => {\n\t\tconst value = node.nodeValue;\n\t\tconst nextValue = normalizeBrandText(value);\n\t\tif (nextValue !== value) {\n\t\t\tnode.nodeValue = nextValue;\n\t\t}\n\t};\n\n\tconst patchBodyText = () => {\n\t\tif (!document.body) {\n\t\t\treturn;\n\t\t}\n\n\t\tconst sidebarName = document.getElementById('sidebar-webui-name');\n\t\tif (sidebarName && sidebarName.textContent !== BRAND_NAME) {\n\t\t\tsidebarName.textContent = BRAND_NAME;\n\t\t}\n\n\t\tconst walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {\n\t\t\tacceptNode: (node) => {\n\t\t\t\tif (!node.nodeValue || !node.nodeValue.includes(OPEN_WEBUI)) {\n\t\t\t\t\treturn NodeFilter.FILTER_REJECT;\n\t\t\t\t}\n\n\t\t\t\tconst parent = node.parentElement;\n\t\t\t\tif (!parent || ['SCRIPT', 'STYLE', 'TEXTAREA', 'INPUT'].includes(parent.tagName)) {\n\t\t\t\t\treturn NodeFilter.FILTER_REJECT;\n\t\t\t\t}\n\n\t\t\t\treturn NodeFilter.FILTER_ACCEPT;\n\t\t\t}\n\t\t});\n\n\t\tconst nodes = [];\n\t\twhile (walker.nextNode()) {\n\t\t\tnodes.push(walker.currentNode);\n\t\t}\n\t\tnodes.forEach(patchTextNode);\n\t};\n\n\tconst patchAll = () => {\n\t\tif (isPatching) {\n\t\t\treturn;\n\t\t}\n\n\t\tisPatching = true;\n\t\ttry {\n\t\t\tpatchThemeClass();\n\t\t\tpatchHead();\n\t\t\tpatchBodyText();\n\t\t} finally {\n\t\t\tisPatching = false;\n\t\t}\n\t};\n\n\tconst schedulePatch = () => {\n\t\tif (patchQueued) {\n\t\t\treturn;\n\t\t}\n\n\t\tpatchQueued = true;\n\t\twindow.requestAnimationFrame(() => {\n\t\t\tpatchQueued = false;\n\t\t\tpatchAll();\n\t\t});\n\t};\n\n\tpatchAll();\n\tdocument.addEventListener('DOMContentLoaded', patchAll, { once: true });\n\twindow.addEventListener('storage', schedulePatch);\n\n\tnew MutationObserver(schedulePatch).observe(document.documentElement, {\n\t\tchildList: true,\n\t\tsubtree: true,\n\t\tcharacterData: true,\n\t\tattributes: true,\n\t\tattributeFilter: ['class', 'content', 'title']\n\t});\n})();\n"
        MANIFEST_JSON = "{\n  \"name\": \"IndieArk Chat\",\n  \"short_name\": \"IndieArk Chat\",\n  \"description\": \"IndieArk Chat\",\n  \"start_url\": \"/\",\n  \"scope\": \"/\",\n  \"display\": \"standalone\",\n  \"background_color\": \"#0b0f19\",\n  \"theme_color\": \"#0b0f19\",\n  \"icons\": [\n    {\n      \"src\": \"/static/web-app-manifest-192x192.png\",\n      \"sizes\": \"192x192\",\n      \"type\": \"image/png\",\n      \"purpose\": \"any maskable\"\n    },\n    {\n      \"src\": \"/static/web-app-manifest-512x512.png\",\n      \"sizes\": \"512x512\",\n      \"type\": \"image/png\",\n      \"purpose\": \"any maskable\"\n    },\n    {\n      \"src\": \"/static/logo.png\",\n      \"sizes\": \"500x500\",\n      \"type\": \"image/png\",\n      \"purpose\": \"any\"\n    }\n  ]\n}\n"


        def square_icon(img, size, padding_ratio=0.0, background=(0, 0, 0, 0)):
            canvas = Image.new('RGBA', (size, size), background)
            max_side = int(size * (1.0 - padding_ratio * 2))
            copy = img.copy()
            copy.thumbnail((max_side, max_side), Image.Resampling.LANCZOS)
            canvas.alpha_composite(copy, ((size - copy.width) // 2, (size - copy.height) // 2))
            return canvas


        def write_assets():
            static_dir = Path(os.environ.get('STATIC_DIR', '/app/backend/open_webui/static'))
            static_dir.mkdir(parents=True, exist_ok=True)

            source = base64.b64decode(SOURCE_IMAGE_WEBP_B64)
            (static_dir / 'source-image.webp').write_bytes(source)

            img = Image.open(io.BytesIO(source)).convert('RGBA')
            assets = [
                ('favicon.png', 64, 0.0),
                ('favicon-96x96.png', 96, 0.0),
                ('favicon-dark.png', 64, 0.0),
                ('apple-touch-icon.png', 180, 0.02),
                ('logo.png', 500, 0.0),
                ('web-app-manifest-192x192.png', 192, 0.0),
                ('web-app-manifest-512x512.png', 512, 0.0),
                ('splash.png', 768, 0.12),
                ('splash-dark.png', 768, 0.12),
            ]
            for name, size, pad in assets:
                square_icon(img, size, pad).save(static_dir / name, 'PNG')

            ico_base = square_icon(img, 64, 0.0)
            ico_base.save(static_dir / 'favicon.ico', sizes=[(16, 16), (32, 32), (48, 48), (64, 64)])

            favicon_b64 = base64.b64encode((static_dir / 'favicon.png').read_bytes()).decode('ascii')
            (static_dir / 'favicon.svg').write_text(
                (
                    '<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">\n'
                    f'  <image href="data:image/png;base64,{favicon_b64}" width="64" height="64" preserveAspectRatio="xMidYMid meet" />\n'
                    '</svg>\n'
                ),
                encoding='utf-8',
            )
            (static_dir / 'custom.css').write_text(CUSTOM_CSS, encoding='utf-8')
            (static_dir / 'loader.js').write_text(LOADER_JS, encoding='utf-8')
            (static_dir / 'manifest.json').write_text(MANIFEST_JSON, encoding='utf-8')
            (static_dir / 'site.webmanifest').write_text(MANIFEST_JSON, encoding='utf-8')
            print('[indieark-branding] static assets written to ' + str(static_dir), flush=True)


        write_assets()

        port = os.environ.get('PORT', '8080')
        wait_seconds = int(os.environ.get('INDIEARK_BRANDING_WAIT_SECONDS', '180'))
        for _ in range(wait_seconds):
            try:
                with urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=1) as response:
                    if response.status < 500:
                        break
            except Exception:
                time.sleep(1)
        else:
            print('[indieark-branding] health wait timed out; writing assets anyway', flush=True)

        write_assets()
        PY
        ) &
        exec bash start.sh
    volumes:
      - open-webui:/app/backend/data
